# Render Blueprint — Amynest-live (api-server)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: amynest-live
    runtime: node
    region: singapore
    plan: starter
    repo: https://github.com/ankur6779/Amynest-live
    branch: main
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@9.15.0 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/api-server build
    startCommand: pnpm --filter @workspace/api-server start
    envVars:
      - key: NODE_VERSION
        value: "20"
