# Render Blueprint — Amynest-live (api-server + static frontend)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: amynest-live
    runtime: node
    region: singapore
    plan: starter
    repo: https://github.com/ankur6779/Amynest-live
    branch: main
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@9.15.0 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/api-server build
    startCommand: pnpm --filter @workspace/api-server start
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Google Drive API — Kids Story Hub, reels, worksheets, coloring, funsheets.
      # Enable "Google Drive API" in Cloud Console. Restrictions: None or IP (not HTTP referrers).
      # Story folders must be "Anyone with the link" can view.
      - key: GOOGLE_API_KEY
        sync: false
      # Alias also accepted: GOOGLE_DRIVE_API_KEY
      # Set in Render dashboard (required for Amy / ElevenLabs TTS):
      # ELEVENLABS_API_KEY — from elevenlabs.io → Profile → API Keys
      # Optional: TTS_STORAGE=postgres (default on Render without GCS)
      # Optional (reuse Replit GCS cache after migration):
      # DEFAULT_OBJECT_STORAGE_BUCKET_ID, GCS_SERVICE_ACCOUNT_JSON

  - type: web
    name: amynest-web
    runtime: static
    region: singapore
    repo: https://github.com/ankur6779/Amynest-live
    branch: main
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@9.15.0 --activate &&
      pnpm install --frozen-lockfile &&
      BASE_PATH=/ PORT=3000 pnpm --filter @workspace/kidschedule build
    staticPublishPath: ./artifacts/kidschedule/dist/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_APP_API_ORIGIN
        value: https://amynest-live.onrender.com
      # Set in Render dashboard (sync with backend / Firebase console):
      # FIREBASE_API_KEY, FIREBASE_AUTH_DOMAIN, FIREBASE_PROJECT_ID,
      # FIREBASE_APP_ID, FIREBASE_MESSAGING_SENDER_ID, VITE_FIREBASE_VAPID_KEY
