# Render Blueprint — Amynest-backend (API) + Amynest-live-1 (static frontend)
# https://render.com/docs/blueprint-spec
#
# Dashboard names (match your Render services):
#   Amynest-backend  → full API (GOOGLE_API_KEY, ELEVENLABS_API_KEY, DATABASE_URL, …)
#   Amynest-live-1   → static build only (VITE_*). API keys here do NOT reach the backend.

services:
  - type: web
    name: Amynest-backend
    runtime: node
    region: singapore
    plan: starter
    repo: https://github.com/ankur6779/Amynest-live
    branch: main
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@9.15.0 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/api-server build
    startCommand: pnpm --filter @workspace/api-server start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: GOOGLE_API_KEY
        sync: false
      # Diagnostics:
      #   GET https://amynest-backend.onrender.com/api/healthz/drive
      #   GET https://amynest-backend.onrender.com/api/healthz/tts
      #   GET https://amynest-backend.onrender.com/api/healthz/env

  - type: web
    name: Amynest-live-1
    runtime: static
    region: singapore
    repo: https://github.com/ankur6779/Amynest-live
    branch: main
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@9.15.0 --activate &&
      pnpm install --frozen-lockfile &&
      BASE_PATH=/ PORT=3000 pnpm --filter @workspace/kidschedule build
    staticPublishPath: ./artifacts/kidschedule/dist/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_APP_API_ORIGIN
        value: https://amynest-backend.onrender.com
