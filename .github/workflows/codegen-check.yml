# Codegen sync check
#
# This job re-runs `pnpm run codegen` (OpenAPI → TypeScript client + Zod schemas)
# and fails if the output differs from what is already committed.
#
# Why this exists
# ---------------
# The pre-commit hook in `scripts/check-codegen.sh` guards individual developer
# machines, but it can be bypassed with `git commit --no-verify` or skipped
# entirely on CI runners that don't install git hooks. This workflow closes that
# gap and ensures the main branch is always in sync regardless of how a commit
# arrives.
#
# If this job fails on your PR, run `pnpm run codegen` locally, stage the
# regenerated files, and push again:
#
#   pnpm run codegen
#   git add lib/api-client-react/src/generated/ lib/api-zod/src/generated/
#   git commit --amend --no-edit   # or a new commit
#   git push

name: Codegen check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  codegen-check:
    name: Verify generated files are up to date
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check codegen output is up to date
        # Runs `pnpm run codegen` internally, then fails if any generated file
        # differs from what is committed — same logic as the pre-commit hook.
        run: sh scripts/check-codegen.sh
