openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: children
    description: Child profile operations
  - name: routines
    description: Daily routine operations
  - name: behaviors
    description: Behavior tracking operations
  - name: dashboard
    description: Dashboard and summary operations
  - name: ai
    description: AI routine generation
  - name: parent-tasks
    description: Per-day, per-child Parent Task completions
  - name: life-skills
    description: Life Skills Mode — daily age-banded skills, streaks, and role-play scenarios
  - name: smart-study
    description: Smart Study Zone insights and adaptive plans
  - name: child-intelligence
    description: Adaptive Family Intelligence — parent goals, daily signals, derived energy profile
  - name: speech
    description: Amy Speech Coach — milestones, pronunciation practice, weekly progress, expert waitlist
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /children:
    get:
      operationId: listChildren
      tags: [children]
      summary: List all children profiles
      responses:
        "200":
          description: List of children
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Child"
    post:
      operationId: createChild
      tags: [children]
      summary: Create a child profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChildBody"
      responses:
        "201":
          description: Created child
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Child"

  /children/{id}:
    get:
      operationId: getChild
      tags: [children]
      summary: Get a child profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Child profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Child"
        "404":
          description: Not found
    patch:
      operationId: updateChild
      tags: [children]
      summary: Update a child profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChildBody"
      responses:
        "200":
          description: Updated child
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Child"
        "404":
          description: Not found
    delete:
      operationId: deleteChild
      tags: [children]
      summary: Delete a child profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /routines:
    get:
      operationId: listRoutines
      tags: [routines]
      summary: List routines
      parameters:
        - name: childId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of routines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Routine"
    post:
      operationId: createRoutine
      tags: [routines]
      summary: Create a routine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoutineBody"
      responses:
        "201":
          description: Created routine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Routine"

  /routines/{id}:
    get:
      operationId: getRoutine
      tags: [routines]
      summary: Get a routine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Routine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Routine"
        "404":
          description: Not found
    delete:
      operationId: deleteRoutine
      tags: [routines]
      summary: Delete a routine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /routines/generate:
    post:
      operationId: generateRoutine
      tags: [ai]
      summary: Generate a daily routine with AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateRoutineBody"
      responses:
        "200":
          description: Generated routine with schedule items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedRoutine"

  /household/orchestrate:
    post:
      operationId: orchestrateHousehold
      tags: [routines]
      summary: Multi-Child Conflict Resolution — orchestrate routines for all children
      description: |
        Accepts per-child draft routines + caregiver availability and returns a
        coordinated household schedule. Detects caregiver overlaps, resource
        contentions, meal misalignments, sleep window violations, and school
        collisions, then applies (or previews) resolutions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HouseholdOrchestrateBody"
      responses:
        "200":
          description: Household routine state with conflicts + resolutions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseholdRoutineState"

  /household/conflicts:
    get:
      operationId: getHouseholdConflicts
      tags: [routines]
      summary: Detect household conflicts for an existing date
      description: |
        Pulls already-saved routines for every child belonging to the user on
        the given date and runs the conflict-detection pass without applying
        any changes. Useful for the household dashboard.
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Household routine state for the requested date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseholdRoutineState"

  /household/forecast:
    get:
      operationId: getHouseholdForecast
      tags: [routines]
      summary: Predictive Caregiver Load Forecast
      description: |
        Returns an anticipatory caregiver-load forecast for the requested
        target date and horizon. Built from historical routine data via
        EWMA smoothing, optionally blended with the user's draft routine
        for that day. Surfaces hotspots, severity-classified bottlenecks,
        and rebalance proposals.
      parameters:
        - name: date
          in: query
          required: true
          schema: { type: string }
        - name: horizonDays
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 7 }
        - name: lookbackDays
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 30 }
      responses:
        "200":
          description: Multi-day caregiver load forecast
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseholdForecastResponse"

  /explain/routine:
    post:
      operationId: explainRoutine
      tags: [routines]
      summary: Explainability — Why this routine?
      description: |
        Accepts a recommendation context and optional raw adaptation strings
        from the generation engine, then returns a fully-attributed
        ExplanationResponse: human-readable summary, decision-factor chips,
        a confidence score, an ordered reasoning trace, and (when available)
        an AI-generated narrative paragraph.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExplainRoutineBody"
      responses:
        "200":
          description: Full explanation for the routine recommendation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExplanationResponse"

  /explain/meal:
    post:
      operationId: explainMeal
      tags: [meals]
      summary: Explainability — Why this meal?
      description: |
        Accepts a meal recommendation context (diet type, allergies, region,
        fridge items, child age) and returns an attributed ExplanationResponse
        explaining why the meal was suggested.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExplainMealBody"
      responses:
        "200":
          description: Full explanation for the meal recommendation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExplanationResponse"

  /explain/history:
    get:
      operationId: getExplainHistory
      tags: [routines]
      summary: Explainability audit log
      description: |
        Returns the last N explanation requests made by the authenticated
        user — powers the AI Explanation Timeline in the UI.
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 50 }
      responses:
        "200":
          description: List of recent explanation audit entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExplanationAuditEntry"

  /speech/milestones:
    get:
      operationId: listSpeechMilestones
      tags: [speech]
      summary: List a child's speech-coach milestones with current statuses
      parameters:
        - name: childId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Milestones with statuses joined from speech_progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpeechMilestonesResponse"

  /speech/milestones/{id}/status:
    post:
      operationId: updateSpeechMilestoneStatus
      tags: [speech]
      summary: Set the milestone status for a child (upsert, idempotent)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSpeechMilestoneStatusBody"
      responses:
        "200":
          description: Updated milestone status row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpeechMilestoneProgress"

  /speech/practice/prompts:
    get:
      operationId: listSpeechPracticePrompts
      tags: [speech]
      summary: Age-appropriate pronunciation prompts for a child
      parameters:
        - name: childId
          in: query
          required: true
          schema:
            type: integer
        - name: kind
          in: query
          required: false
          schema:
            type: string
            enum: [letter, phonic, word, sentence]
      responses:
        "200":
          description: List of prompts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SpeechPracticePrompt"

  /speech/practice/log:
    post:
      operationId: logSpeechPracticeAttempt
      tags: [speech]
      summary: |
        Log a pronunciation-practice attempt. Gated by hub_speech_pronounce
        (lifetime: 1 free use, then 402 Payment Required).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogSpeechPracticeAttemptBody"
      responses:
        "201":
          description: Created log entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpeechPracticeLogEntry"

  /speech/progress:
    get:
      operationId: getSpeechProgress
      tags: [speech]
      summary: Weekly speech-coach progress summary for a child
      parameters:
        - name: childId
          in: query
          required: true
          schema:
            type: integer
        - name: range
          in: query
          required: false
          schema:
            type: string
            enum: [week]
            default: week
      responses:
        "200":
          description: Progress summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpeechProgressSummary"

  /speech/expert-waitlist:
    post:
      operationId: joinSpeechExpertWaitlist
      tags: [speech]
      summary: |
        Join the certified-experts waitlist (idempotent per user — repeat calls
        return the existing entry with `alreadyJoined: true`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinSpeechExpertWaitlistBody"
      responses:
        "200":
          description: Waitlist entry (existing or newly created)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpeechExpertWaitlistEntry"

  /safety/validate:
    post:
      operationId: validateRoutineSafety
      tags: [routines]
      summary: AI Safety Layer — validate a routine against age-banded safety rules
      description: |
        Module 4 — runs deterministic safety validation against the candidate
        routine activities. Returns a 0-100 safety score, an `isValid` flag
        (false when any critical violations are present), the list of
        violations grouped by category, and a list of suggested adjustments.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SafetyValidationBody"
      responses:
        "200":
          description: Safety validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SafetyValidationResponse"

  /behaviors:
    get:
      operationId: listBehaviors
      tags: [behaviors]
      summary: List behavior logs
      parameters:
        - name: childId
          in: query
          required: false
          schema:
            type: integer
        - name: date
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of behavior logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BehaviorLog"
    post:
      operationId: createBehaviorLog
      tags: [behaviors]
      summary: Log a behavior
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBehaviorLogBody"
      responses:
        "201":
          description: Created behavior log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BehaviorLog"

  /behaviors/{id}:
    delete:
      operationId: deleteBehaviorLog
      tags: [behaviors]
      summary: Delete a behavior log
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-routines:
    get:
      operationId: getRecentRoutines
      tags: [dashboard]
      summary: Get recently generated routines
      responses:
        "200":
          description: Recent routines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Routine"

  /routines/check:
    get:
      operationId: checkRoutine
      tags: [routines]
      summary: Check if a routine exists for child + date
      parameters:
        - name: childId
          in: query
          required: true
          schema:
            type: integer
        - name: date
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Routine existence check
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckRoutineResponse"

  /routines/{id}/items:
    patch:
      operationId: updateRoutineItems
      tags: [routines]
      summary: Update routine items (mark complete/skipped/delayed)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoutineItemsBody"
      responses:
        "200":
          description: Updated routine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Routine"

  /routines/{id}/ui-prefs:
    patch:
      operationId: updateRoutineUiPrefs
      tags: [routines]
      summary: Update per-routine UI preferences (e.g. ageBandFilter) shared across devices
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoutineUiPrefsBody"
      responses:
        "200":
          description: Updated routine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Routine"
        "404":
          description: Not found

  /insights:
    post:
      operationId: generateInsights
      tags: [ai]
      summary: Generate weekly insights from routine completion data
      responses:
        "200":
          description: Generated insights
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateInsightsResponse"

  /babysitters:
    get:
      operationId: listBabysitters
      tags: [children]
      summary: List babysitters
      responses:
        "200":
          description: Babysitters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BabysitterSchema"
    post:
      operationId: createBabysitter
      tags: [children]
      summary: Add a babysitter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBabysitterBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BabysitterSchema"

  /babysitters/{id}:
    delete:
      operationId: deleteBabysitter
      tags: [children]
      summary: Delete a babysitter
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /parent-profile:
    get:
      operationId: getParentProfile
      tags: [children]
      summary: Get current user's parent profile
      responses:
        "200":
          description: Parent profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetParentProfileResponse"
        "404":
          description: Not found
    put:
      operationId: upsertParentProfile
      tags: [children]
      summary: Create or update parent profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertParentProfileBody"
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetParentProfileResponse"

  /ai/recipe:
    post:
      operationId: getRecipe
      tags: [ai]
      summary: Look up a rule-based recipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetRecipeBody"
      responses:
        "200":
          description: Recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRecipeResponse"

  /ai/assistant:
    post:
      operationId: askAssistant
      tags: [ai]
      summary: Ask the rule-based parenting assistant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AskAssistantBody"
      responses:
        "200":
          description: Answer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AskAssistantResponse"

  /ai-tutor/chat:
    post:
      operationId: aiTutorChat
      tags: [ai]
      summary: Structured tutor reply (teach / practice / quiz / doubt)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiTutorChatBody"
      responses:
        "200":
          description: Tutor reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiTutorChatResponse"

  /parent-tasks:
    get:
      operationId: listParentTaskCompletions
      tags: [parent-tasks]
      summary: List Parent Task completions for a child (optionally filtered by date)
      parameters:
        - name: childId
          in: query
          required: true
          schema:
            type: integer
        - name: date
          in: query
          required: false
          description: ISO date (YYYY-MM-DD). When omitted returns all completions for the child.
          schema:
            type: string
      responses:
        "200":
          description: List of completions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ParentTaskCompletion"
    post:
      operationId: setParentTaskCompletion
      tags: [parent-tasks]
      summary: Mark a Parent Task as done for a child on a date (idempotent)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetParentTaskCompletionBody"
      responses:
        "200":
          description: Completion record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentTaskCompletion"
    delete:
      operationId: clearParentTaskCompletion
      tags: [parent-tasks]
      summary: Clear a Parent Task completion (uncheck) for a child on a date
      parameters:
        - name: childId
          in: query
          required: true
          schema:
            type: integer
        - name: date
          in: query
          required: true
          schema:
            type: string
        - name: taskKey
          in: query
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Cleared (or already absent)

  /life-skills/today:
    get:
      operationId: getLifeSkillsToday
      tags: [life-skills]
      summary: Today's age-banded life-skill cards plus streak + weekly bar
      parameters:
        - name: childId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Today's life-skills payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LifeSkillsTodayResponse"

  /life-skills/progress:
    post:
      operationId: setLifeSkillProgress
      tags: [life-skills]
      summary: Mark a life skill as done or skipped for a child on a date
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetLifeSkillProgressBody"
      responses:
        "200":
          description: Updated streak + weekly bar after the write
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LifeSkillProgressResponse"

  /life-skills/role-plays:
    get:
      operationId: getLifeSkillRolePlays
      tags: [life-skills]
      summary: Role-play scenarios for an age band
      parameters:
        - name: ageBand
          in: query
          required: true
          schema:
            type: string
            enum: [toddler, preschool, kid, teen]
      responses:
        "200":
          description: Role-play scenarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LifeSkillRolePlay"

  /smart-study/next-questions:
    post:
      operationId: getSmartStudyNextQuestions
      tags: [smart-study]
      summary: Get an adaptive, anti-repetition batch of Smart Study questions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SmartStudyNextQuestionsRequest"
      responses:
        "200":
          description: Adaptive question batch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmartStudyNextQuestionsResponse"
        "400":
          description: Invalid request body
        "401":
          description: Unauthorized
        "404":
          description: Child not found
        "500":
          description: Server error (AI + dataset both failed)

  /smart-study/insights:
    get:
      operationId: getSmartStudyInsights
      tags: [smart-study]
      summary: Get parent-facing Smart Study insights for a child
      parameters:
        - name: childId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Insights summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmartStudyInsights"
        "404":
          description: Child not found

  /dashboard/behavior-stats:
    get:
      operationId: getBehaviorStats
      tags: [dashboard]
      summary: Get behavior stats per child
      responses:
        "200":
          description: Behavior stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BehaviorStat"

  /child-intelligence/{childId}:
    get:
      operationId: getChildIntelligence
      tags: [child-intelligence]
      summary: Get a child's adaptive intelligence snapshot (goals, energy profile, recent signals)
      parameters:
        - name: childId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Child intelligence snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChildIntelligenceResponse"

  /child-intelligence/{childId}/goals:
    put:
      operationId: updateChildGoals
      tags: [child-intelligence]
      summary: Replace the child's structured parent-selected optimization goals
      parameters:
        - name: childId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChildGoalsBody"
      responses:
        "200":
          description: Updated goals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChildIntelligenceResponse"

  /child-intelligence/{childId}/signal:
    post:
      operationId: logChildDailySignal
      tags: [child-intelligence]
      summary: Log or upsert a daily behavioral signal for a child
      parameters:
        - name: childId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogChildDailySignalBody"
      responses:
        "200":
          description: Stored signal and refreshed snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChildIntelligenceResponse"

  /child-intelligence/{childId}/weekly-report:
    get:
      operationId: getChildWeeklyReport
      tags: [child-intelligence]
      summary: 7-day rollup of signals + completion + goal progress, with deltas vs the prior 7 days.
      parameters:
        - name: childId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Weekly intelligence report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyReportResponse"

  /child-intelligence/{childId}/insights:
    get:
      operationId: getChildIntelligenceInsights
      tags: [child-intelligence]
      summary: Risk-window predictions and behavior↔routine correlations.
      parameters:
        - name: childId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Insights bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntelligenceInsightsResponse"

  /child-intelligence/{childId}/learning-weights:
    get:
      operationId: getChildLearningWeights
      tags: [child-intelligence]
      summary: Closed-loop learning weights derived from behaviors and per-item completion.
      parameters:
        - name: childId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Learning weights bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningWeightsResponse"

  /child-intelligence/{childId}/nudges:
    get:
      operationId: getChildNudges
      tags: [child-intelligence]
      summary: Ranked productive nudges derived from risk windows, learning weights, and weekly goals.
      parameters:
        - name: childId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Productive nudges bundle (top 5, sorted desc by priority).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductiveNudgesResponse"

components:
  schemas:
    # ─── Household Orchestration (Multi-Child Conflict Resolution) ─────
    HouseholdRoutineItem:
      type: object
      properties:
        time:        { type: string }
        activity:    { type: string }
        duration:    { type: integer }
        category:    { type: string }
        notes:       { type: string, nullable: true }
        status:      { type: string, nullable: true }
        rewardPoints: { type: integer, nullable: true }
        caregiver: { type: string, nullable: true, enum: [mom, dad, both, grandparent, babysitter] }
        shiftedFromTime: { type: string, nullable: true }
        isAnchor:    { type: boolean, nullable: true }
      required: [time, activity, duration, category]

    HouseholdChildProfile:
      type: object
      properties:
        id:            { type: integer }
        name:          { type: string }
        age:           { type: integer }
        ageMonths:     { type: integer, nullable: true }
        wakeUpTime:    { type: string, nullable: true }
        sleepTime:     { type: string, nullable: true }
        schoolStartTime: { type: string, nullable: true }
        schoolEndTime: { type: string, nullable: true }
        hasSchoolToday: { type: boolean, nullable: true }
        defaultCaregiver: { type: string, nullable: true, enum: [mom, dad, both, grandparent, babysitter] }
        isSick:        { type: boolean, nullable: true }
        isInfant:      { type: boolean, nullable: true }
      required: [id, name, age]

    HouseholdChildRoutine:
      type: object
      properties:
        child: { $ref: "#/components/schemas/HouseholdChildProfile" }
        items:
          type: array
          items: { $ref: "#/components/schemas/HouseholdRoutineItem" }
      required: [child, items]

    HouseholdCaregiverAvailability:
      type: object
      properties:
        caregiver: { type: string, enum: [mom, dad, both, grandparent, babysitter] }
        capacity:  { type: integer }
        windows:
          type: array
          items:
            type: object
            properties:
              start: { type: string }
              end:   { type: string }
            required: [start, end]
      required: [caregiver, capacity, windows]

    HouseholdLoadHotspot:
      type: object
      properties:
        id:             { type: string }
        caregiver:      { type: string }
        startTime:      { type: string }
        endTime:        { type: string }
        startTime24:    { type: string }
        endTime24:      { type: string }
        projectedLoad:  { type: number }
        capacity:       { type: integer }
        overload:       { type: number }
        confidence:     { type: integer }
      required: [id, caregiver, startTime, endTime, startTime24, endTime24, projectedLoad, capacity, overload, confidence]

    HouseholdLoadBucketSeries:
      type: object
      properties:
        bucketMinutes: { type: integer }
        buckets:       { type: integer }
        load:
          type: object
          additionalProperties:
            type: array
            items: { type: number }
      required: [bucketMinutes, buckets, load]

    HouseholdCaregiverLoadForecast:
      type: object
      properties:
        date:        { type: string }
        historyDays: { type: integer }
        series:      { $ref: "#/components/schemas/HouseholdLoadBucketSeries" }
        hotspots:
          type: array
          items: { $ref: "#/components/schemas/HouseholdLoadHotspot" }
        confidence:  { type: integer }
      required: [date, historyDays, series, hotspots, confidence]

    HouseholdBottleneckPrediction:
      type: object
      properties:
        date:        { type: string }
        caregiver:   { type: string }
        windowLabel: { type: string }
        severity:    { type: string, enum: [low, medium, high] }
        reason:      { type: string }
      required: [date, caregiver, windowLabel, severity, reason]

    HouseholdRebalanceProposal:
      type: object
      properties:
        id:               { type: string }
        date:             { type: string }
        hotspotId:        { type: string }
        fromCaregiver:    { type: string }
        toCaregiver:      { type: string }
        childId:          { type: integer }
        childName:        { type: string }
        activity:         { type: string }
        startTime:        { type: string }
        rationale:        { type: string }
        projectedRelief:  { type: number }
      required: [id, date, hotspotId, fromCaregiver, toCaregiver, childId, childName, activity, startTime, rationale, projectedRelief]

    HouseholdForecastResponse:
      type: object
      properties:
        generatedAt:        { type: string }
        horizonDays:        { type: integer }
        householdLoadScore: { type: integer }
        forecasts:
          type: array
          items: { $ref: "#/components/schemas/HouseholdCaregiverLoadForecast" }
        bottlenecks:
          type: array
          items: { $ref: "#/components/schemas/HouseholdBottleneckPrediction" }
        rebalanceProposals:
          type: array
          items: { $ref: "#/components/schemas/HouseholdRebalanceProposal" }
      required: [generatedAt, horizonDays, householdLoadScore, forecasts, bottlenecks, rebalanceProposals]

    HouseholdConflict:
      type: object
      properties:
        id:          { type: string }
        kind:        { type: string, enum: [caregiver_overlap, caregiver_overload, resource_contention, meal_misalignment, sleep_window_violation, school_collision, shared_activity_opportunity] }
        explanation: { type: string }
        childIds:
          type: array
          items: { type: integer }
        caregiver:   { type: string, nullable: true }
        resource:    { type: string, nullable: true }
        startTime:   { type: string }
        endTime:     { type: string }
        severity:    { type: integer }
      required: [id, kind, explanation, childIds, startTime, endTime, severity]

    HouseholdResolutionChange:
      type: object
      properties:
        childId:       { type: integer }
        fromTime:      { type: string }
        toTime:        { type: string }
        activity:      { type: string }
        action:        { type: string, enum: [shift, drop, merge, reassign] }
        newCaregiver:  { type: string, nullable: true }
      required: [childId, fromTime, toTime, activity, action]

    HouseholdResolution:
      type: object
      properties:
        conflictId:        { type: string }
        strategy:          { type: string, enum: [shift_later, shift_earlier, synchronize_meals, merge_into_shared_activity, swap_caregiver, split_resource_window, drop_optional, no_action] }
        rationale:         { type: string }
        severityReduction: { type: integer }
        changes:
          type: array
          items: { $ref: "#/components/schemas/HouseholdResolutionChange" }
      required: [conflictId, strategy, rationale, severityReduction, changes]

    HouseholdTimelineEntry:
      type: object
      properties:
        childId:   { type: integer }
        childName: { type: string }
        item:      { $ref: "#/components/schemas/HouseholdRoutineItem" }
      required: [childId, childName, item]

    HouseholdTimelineSlot:
      type: object
      properties:
        startTime: { type: string }
        endTime:   { type: string }
        hasConflict: { type: boolean }
        caregivers:
          type: array
          items: { type: string }
        resources:
          type: array
          items: { type: string }
        entries:
          type: array
          items: { $ref: "#/components/schemas/HouseholdTimelineEntry" }
      required: [startTime, endTime, hasConflict, caregivers, resources, entries]

    HouseholdSummary:
      type: object
      properties:
        totalConflicts:        { type: integer }
        resolvedConflicts:     { type: integer }
        sharedActivityWindows: { type: integer }
        caregiverPeakLoad:     { type: integer }
        sleepIntegrityScore:   { type: integer }
        overallScore:          { type: integer }
      required: [totalConflicts, resolvedConflicts, sharedActivityWindows, caregiverPeakLoad, sleepIntegrityScore, overallScore]

    HouseholdReasoningStep:
      type: object
      properties:
        step:        { type: string }
        detail:      { type: string }
        inputCount:  { type: integer, nullable: true }
        outputCount: { type: integer, nullable: true }
      required: [step, detail]

    HouseholdRoutineState:
      type: object
      properties:
        date:             { type: string }
        originalRoutines:
          type: array
          items: { $ref: "#/components/schemas/HouseholdChildRoutine" }
        finalRoutines:
          type: array
          items: { $ref: "#/components/schemas/HouseholdChildRoutine" }
        conflicts:
          type: array
          items: { $ref: "#/components/schemas/HouseholdConflict" }
        postResolutionConflicts:
          type: array
          items: { $ref: "#/components/schemas/HouseholdConflict" }
        resolutions:
          type: array
          items: { $ref: "#/components/schemas/HouseholdResolution" }
        timeline:
          type: array
          items: { $ref: "#/components/schemas/HouseholdTimelineSlot" }
        summary:        { $ref: "#/components/schemas/HouseholdSummary" }
        reasoningTrace:
          type: array
          items: { $ref: "#/components/schemas/HouseholdReasoningStep" }
      required: [date, originalRoutines, finalRoutines, conflicts, postResolutionConflicts, resolutions, timeline, summary, reasoningTrace]

    HouseholdOrchestrateBody:
      type: object
      properties:
        date:    { type: string }
        dryRun:  { type: boolean, nullable: true }
        mealSyncWindowMinutes: { type: integer, nullable: true }
        bucketMinutes:         { type: integer, nullable: true }
        routines:
          type: array
          items: { $ref: "#/components/schemas/HouseholdChildRoutine" }
        caregivers:
          type: array
          items: { $ref: "#/components/schemas/HouseholdCaregiverAvailability" }
      required: [date, routines, caregivers]

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Child:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        dob:
          type: string
          nullable: true
        age:
          type: integer
        ageMonths:
          type: integer
        isSchoolGoing:
          type: boolean
          nullable: true
        childClass:
          type: string
          nullable: true
        schoolStartTime:
          type: string
        schoolEndTime:
          type: string
        schoolDays:
          type: array
          nullable: true
          items:
            type: integer
            minimum: 1
            maximum: 7
        wakeUpTime:
          type: string
        sleepTime:
          type: string
        travelMode:
          type: string
        travelModeOther:
          type: string
          nullable: true
        foodType:
          type: string
        goals:
          type: string
        babysitterId:
          type: integer
          nullable: true
        photoUrl:
          type: string
          nullable: true
        feedingType:
          type: string
          nullable: true
          description: Infant-only — how the baby is fed. One of "breastfeeding", "formula", "mixed".
        sleepPattern:
          type: string
          nullable: true
          description: Infant-only — sleep style captured during onboarding. One of "flexible", "irregular", "short_naps".
        dietType:
          type: string
          nullable: true
        foodStyle:
          type: string
          nullable: true
        subCuisine:
          type: string
          nullable: true
        allergies:
          type: string
          nullable: true
        foodPrefInherited:
          type: boolean
          nullable: true
        foodPrefCustomized:
          type: boolean
          nullable: true
        parentGoals:
          type: array
          nullable: true
          description: Adaptive Family Intelligence — structured parent-selected optimization goals.
          items:
            type: string
            enum: [improve_sleep, reduce_tantrums, improve_focus, reduce_screen_time, increase_independence]
        energyProfile:
          allOf:
            - $ref: "#/components/schemas/EnergyProfile"
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - name
        - age
        - ageMonths
        - schoolStartTime
        - schoolEndTime
        - wakeUpTime
        - sleepTime
        - travelMode
        - foodType
        - goals
        - createdAt

    CreateChildBody:
      type: object
      properties:
        name:
          type: string
        dob:
          type: string
          nullable: true
        age:
          type: integer
        ageMonths:
          type: integer
        isSchoolGoing:
