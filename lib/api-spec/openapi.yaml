openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: children
    description: Child profile operations
  - name: routines
    description: Daily routine operations
  - name: behaviors
    description: Behavior tracking operations
  - name: dashboard
    description: Dashboard and summary operations
  - name: ai
    description: AI routine generation
  - name: parent-tasks
    description: Per-day, per-child Parent Task completions
  - name: life-skills
    description: Life Skills Mode — daily age-banded skills, streaks, and role-play scenarios
  - name: smart-study
    description: Smart Study Zone insights and adaptive plans
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /children:
    get:
      operationId: listChildren
      tags: [children]
      summary: List all children profiles
      responses:
        "200":
          description: List of children
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Child"
    post:
      operationId: createChild
      tags: [children]
      summary: Create a child profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChildBody"
      responses:
        "201":
          description: Created child
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Child"

  /children/{id}:
    get:
      operationId: getChild
      tags: [children]
      summary: Get a child profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Child profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Child"
        "404":
          description: Not found
    patch:
      operationId: updateChild
      tags: [children]
      summary: Update a child profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChildBody"
      responses:
        "200":
          description: Updated child
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Child"
        "404":
          description: Not found
    delete:
      operationId: deleteChild
      tags: [children]
      summary: Delete a child profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /routines:
    get:
      operationId: listRoutines
      tags: [routines]
      summary: List routines
      parameters:
        - name: childId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of routines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Routine"
    post:
      operationId: createRoutine
      tags: [routines]
      summary: Create a routine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoutineBody"
      responses:
        "201":
          description: Created routine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Routine"

  /routines/{id}:
    get:
      operationId: getRoutine
      tags: [routines]
      summary: Get a routine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Routine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Routine"
        "404":
          description: Not found
    delete:
      operationId: deleteRoutine
      tags: [routines]
      summary: Delete a routine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /routines/generate:
    post:
      operationId: generateRoutine
      tags: [ai]
      summary: Generate a daily routine with AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateRoutineBody"
      responses:
        "200":
          description: Generated routine with schedule items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedRoutine"

  /behaviors:
    get:
      operationId: listBehaviors
      tags: [behaviors]
      summary: List behavior logs
      parameters:
        - name: childId
          in: query
          required: false
          schema:
            type: integer
        - name: date
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of behavior logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BehaviorLog"
    post:
      operationId: createBehaviorLog
      tags: [behaviors]
      summary: Log a behavior
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBehaviorLogBody"
      responses:
        "201":
          description: Created behavior log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BehaviorLog"

  /behaviors/{id}:
    delete:
      operationId: deleteBehaviorLog
      tags: [behaviors]
      summary: Delete a behavior log
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-routines:
    get:
      operationId: getRecentRoutines
      tags: [dashboard]
      summary: Get recently generated routines
      responses:
        "200":
          description: Recent routines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Routine"

  /routines/check:
    get:
      operationId: checkRoutine
      tags: [routines]
      summary: Check if a routine exists for child + date
      parameters:
        - name: childId
          in: query
          required: true
          schema:
            type: integer
        - name: date
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Routine existence check
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckRoutineResponse"

  /routines/{id}/items:
    patch:
      operationId: updateRoutineItems
      tags: [routines]
      summary: Update routine items (mark complete/skipped/delayed)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoutineItemsBody"
      responses:
        "200":
          description: Updated routine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Routine"

  /routines/{id}/ui-prefs:
    patch:
      operationId: updateRoutineUiPrefs
      tags: [routines]
      summary: Update per-routine UI preferences (e.g. ageBandFilter) shared across devices
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoutineUiPrefsBody"
      responses:
        "200":
          description: Updated routine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Routine"
        "404":
          description: Not found

  /insights:
    post:
      operationId: generateInsights
      tags: [ai]
      summary: Generate weekly insights from routine completion data
      responses:
        "200":
          description: Generated insights
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateInsightsResponse"

  /babysitters:
    get:
      operationId: listBabysitters
      tags: [children]
      summary: List babysitters
      responses:
        "200":
          description: Babysitters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BabysitterSchema"
    post:
      operationId: createBabysitter
      tags: [children]
      summary: Add a babysitter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBabysitterBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BabysitterSchema"

  /babysitters/{id}:
    delete:
      operationId: deleteBabysitter
      tags: [children]
      summary: Delete a babysitter
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /parent-profile:
    get:
      operationId: getParentProfile
      tags: [children]
      summary: Get current user's parent profile
      responses:
        "200":
          description: Parent profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetParentProfileResponse"
        "404":
          description: Not found
    put:
      operationId: upsertParentProfile
      tags: [children]
      summary: Create or update parent profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertParentProfileBody"
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetParentProfileResponse"

  /ai/recipe:
    post:
      operationId: getRecipe
      tags: [ai]
      summary: Look up a rule-based recipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetRecipeBody"
      responses:
        "200":
          description: Recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRecipeResponse"

  /ai/assistant:
    post:
      operationId: askAssistant
      tags: [ai]
      summary: Ask the rule-based parenting assistant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AskAssistantBody"
      responses:
        "200":
          description: Answer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AskAssistantResponse"

  /ai-tutor/chat:
    post:
      operationId: aiTutorChat
      tags: [ai]
      summary: Structured tutor reply (teach / practice / quiz / doubt)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiTutorChatBody"
      responses:
        "200":
          description: Tutor reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiTutorChatResponse"

  /parent-tasks:
    get:
      operationId: listParentTaskCompletions
      tags: [parent-tasks]
      summary: List Parent Task completions for a child (optionally filtered by date)
      parameters:
        - name: childId
          in: query
          required: true
          schema:
            type: integer
        - name: date
          in: query
          required: false
          description: ISO date (YYYY-MM-DD). When omitted returns all completions for the child.
          schema:
            type: string
      responses:
        "200":
          description: List of completions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ParentTaskCompletion"
    post:
      operationId: setParentTaskCompletion
      tags: [parent-tasks]
      summary: Mark a Parent Task as done for a child on a date (idempotent)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetParentTaskCompletionBody"
      responses:
        "200":
          description: Completion record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentTaskCompletion"
    delete:
      operationId: clearParentTaskCompletion
      tags: [parent-tasks]
      summary: Clear a Parent Task completion (uncheck) for a child on a date
      parameters:
        - name: childId
          in: query
          required: true
          schema:
            type: integer
        - name: date
          in: query
          required: true
          schema:
            type: string
        - name: taskKey
          in: query
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Cleared (or already absent)

  /life-skills/today:
    get:
      operationId: getLifeSkillsToday
      tags: [life-skills]
      summary: Today's age-banded life-skill cards plus streak + weekly bar
      parameters:
        - name: childId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Today's life-skills payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LifeSkillsTodayResponse"

  /life-skills/progress:
    post:
      operationId: setLifeSkillProgress
      tags: [life-skills]
      summary: Mark a life skill as done or skipped for a child on a date
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetLifeSkillProgressBody"
      responses:
        "200":
          description: Updated streak + weekly bar after the write
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LifeSkillProgressResponse"

  /life-skills/role-plays:
    get:
      operationId: getLifeSkillRolePlays
      tags: [life-skills]
      summary: Role-play scenarios for an age band
      parameters:
        - name: ageBand
          in: query
          required: true
          schema:
            type: string
            enum: [toddler, preschool, kid, teen]
      responses:
        "200":
          description: Role-play scenarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LifeSkillRolePlay"

  /smart-study/insights:
    get:
      operationId: getSmartStudyInsights
      tags: [smart-study]
      summary: Get parent-facing Smart Study insights for a child
      parameters:
        - name: childId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Insights summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmartStudyInsights"
        "404":
          description: Child not found

  /dashboard/behavior-stats:
    get:
      operationId: getBehaviorStats
      tags: [dashboard]
      summary: Get behavior stats per child
      responses:
        "200":
          description: Behavior stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BehaviorStat"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Child:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        dob:
          type: string
          nullable: true
        age:
          type: integer
        ageMonths:
          type: integer
        isSchoolGoing:
          type: boolean
          nullable: true
        childClass:
          type: string
          nullable: true
        schoolStartTime:
          type: string
        schoolEndTime:
          type: string
        schoolDays:
          type: array
          nullable: true
          items:
            type: integer
            minimum: 1
            maximum: 7
        wakeUpTime:
          type: string
        sleepTime:
          type: string
        travelMode:
          type: string
        travelModeOther:
          type: string
          nullable: true
        foodType:
          type: string
        goals:
          type: string
        babysitterId:
          type: integer
          nullable: true
        photoUrl:
          type: string
          nullable: true
        feedingType:
          type: string
          nullable: true
          description: Infant-only — how the baby is fed. One of "breastfeeding", "formula", "mixed".
        sleepPattern:
          type: string
          nullable: true
          description: Infant-only — sleep style captured during onboarding. One of "flexible", "irregular", "short_naps".
        dietType:
          type: string
          nullable: true
        foodStyle:
          type: string
          nullable: true
        subCuisine:
          type: string
          nullable: true
        allergies:
          type: string
          nullable: true
        foodPrefInherited:
          type: boolean
          nullable: true
        foodPrefCustomized:
          type: boolean
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - name
        - age
        - ageMonths
        - schoolStartTime
        - schoolEndTime
        - wakeUpTime
        - sleepTime
        - travelMode
        - foodType
        - goals
        - createdAt

    CreateChildBody:
      type: object
      properties:
        name:
          type: string
        dob:
          type: string
          nullable: true
        age:
          type: integer
        ageMonths:
          type: integer
        isSchoolGoing:
          type: boolean
          nullable: true
        childClass:
          type: string
          nullable: true
        schoolStartTime:
          type: string
        schoolEndTime:
          type: string
        schoolDays:
          type: array
          nullable: true
          items:
            type: integer
            minimum: 1
            maximum: 7
        wakeUpTime:
          type: string
        sleepTime:
          type: string
        travelMode:
          type: string
        travelModeOther:
          type: string
          nullable: true
        foodType:
          type: string
        goals:
          type: string
        babysitterId:
          type: integer
          nullable: true
        photoUrl:
          type: string
          nullable: true
        feedingType:
          type: string
          nullable: true
          description: Infant-only — how the baby is fed. One of "breastfeeding", "formula", "mixed".
        sleepPattern:
          type: string
          nullable: true
          description: Infant-only — sleep style captured during onboarding. One of "flexible", "irregular", "short_naps".
        dietType:
          type: string
          nullable: true
        foodStyle:
          type: string
          nullable: true
        subCuisine:
          type: string
          nullable: true
        allergies:
          type: string
          nullable: true
        foodPrefInherited:
          type: boolean
          nullable: true
        foodPrefCustomized:
          type: boolean
          nullable: true
      required:
        - name
        - age
        - schoolStartTime
        - schoolEndTime
        - goals

    UpdateChildBody:
      type: object
      properties:
        name:
          type: string
        dob:
          type: string
          nullable: true
        age:
          type: integer
        ageMonths:
          type: integer
        isSchoolGoing:
          type: boolean
          nullable: true
        childClass:
          type: string
          nullable: true
        schoolStartTime:
          type: string
        schoolEndTime:
          type: string
        schoolDays:
          type: array
          nullable: true
          items:
            type: integer
            minimum: 1
            maximum: 7
        wakeUpTime:
          type: string
        sleepTime:
          type: string
        travelMode:
          type: string
        travelModeOther:
          type: string
          nullable: true
        foodType:
          type: string
        goals:
          type: string
        babysitterId:
          type: integer
          nullable: true
        photoUrl:
          type: string
          nullable: true
        feedingType:
          type: string
          nullable: true
          description: Infant-only — how the baby is fed. One of "breastfeeding", "formula", "mixed".
        sleepPattern:
          type: string
          nullable: true
          description: Infant-only — sleep style captured during onboarding. One of "flexible", "irregular", "short_naps".
        dietType:
          type: string
          nullable: true
        foodStyle:
          type: string
          nullable: true
        subCuisine:
          type: string
          nullable: true
        allergies:
          type: string
          nullable: true
        foodPrefInherited:
          type: boolean
          nullable: true
        foodPrefCustomized:
          type: boolean
          nullable: true

    RoutineItem:
      type: object
      properties:
        id:
          type: string
        time:
          type: string
        activity:
          type: string
        duration:
          type: integer
        category:
          type: string
        notes:
          type: string
        rewardPoints:
          type: integer
        status:
          type: string
          enum: [pending, completed, skipped, delayed]
        meal:
          type: string
          nullable: true
        recipe:
          type: object
          nullable: true
          properties:
            prepTime: { type: string }
            cookTime: { type: string }
            servings: { type: string }
            ingredients:
              type: array
              items: { type: string }
            steps:
              type: array
              items: { type: string }
            tip: { type: string, nullable: true }
        nutrition:
          type: object
          nullable: true
          properties:
            calories: { type: string }
            protein: { type: string }
            carbs: { type: string }
            fat: { type: string }
            notes: { type: string, nullable: true }
        ageBand:
          type: string
          nullable: true
          enum: ["2-5", "6-10", "10+"]
        parentHubTopic:
          type: string
          nullable: true
      required:
        - time
        - activity
        - duration
        - category

    Routine:
      type: object
      properties:
        id:
          type: integer
        childId:
          type: integer
        childName:
          type: string
        date:
          type: string
        title:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/RoutineItem"
        uiPrefs:
          $ref: "#/components/schemas/RoutineUiPrefs"
        createdAt:
          type: string
      required:
        - id
        - childId
        - childName
        - date
        - title
        - items
        - uiPrefs
        - createdAt

    RoutineUiPrefs:
      type: object
      description: Per-routine UI preferences synced across web + mobile.
      properties:
        ageBandFilter:
          type: string
          nullable: true
          description: Currently selected age-band filter chip, or null for "All".
        pushReminders:
          type: boolean
          description: |
            When true, the server-side notification cron sends a push reminder
            ~5 minutes before each pending item in this routine. Independent of
            local on-device notifications and survives reinstall / Expo Go.

    UpdateRoutineUiPrefsBody:
      type: object
      description: Patch payload for routine UI preferences. Only the fields included are updated.
      properties:
        ageBandFilter:
          type: string
          nullable: true
          description: Selected age-band filter chip, or null to clear.
        pushReminders:
          type: boolean
          description: Enable or disable server-pushed per-task reminders for this routine.

    CreateRoutineBody:
      type: object
      properties:
        childId:
          type: integer
        date:
          type: string
        title:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/RoutineItem"
        override:
          type: boolean
      required:
        - childId
        - date
        - title
        - items

    GenerateRoutineBody:
      type: object
      properties:
        childId:
          type: integer
        date:
          type: string
        hasSchool:
          type: boolean
        specialPlans:
          type: string
          nullable: true
        fridgeItems:
          type: string
          nullable: true
        mood:
          type: string
          nullable: true
        caregiver:
          type: string
          enum: [mom, dad, both, grandparent, babysitter]
          default: mom
          description: Who is handling the child today. Drives tone, simplification, and bonding density. Reuses the HandlerKey enum from @workspace/family-routine.
        weatherOutdoor:
          type: string
          enum: [yes, no, limited]
          default: "yes"
          description: Outdoor-weather signal. "no" swaps outdoor blocks for indoor alternatives, "limited" shortens them and adds an indoor backup note.
        region:
          type: string
          nullable: true
        wakeTime:
          type: string
          nullable: true
        age:
