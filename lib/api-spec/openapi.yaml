          type: string
          nullable: true
        schoolStartTime:
          type: string
        schoolEndTime:
          type: string
        schoolDays:
          type: array
          nullable: true
          items:
            type: integer
            minimum: 1
            maximum: 7
        wakeUpTime:
          type: string
        sleepTime:
          type: string
        travelMode:
          type: string
        travelModeOther:
          type: string
          nullable: true
        foodType:
          type: string
        goals:
          type: string
        babysitterId:
          type: integer
          nullable: true
        photoUrl:
          type: string
          nullable: true
        feedingType:
          type: string
          nullable: true
          description: Infant-only — how the baby is fed. One of "breastfeeding", "formula", "mixed".
        sleepPattern:
          type: string
          nullable: true
          description: Infant-only — sleep style captured during onboarding. One of "flexible", "irregular", "short_naps".
        dietType:
          type: string
          nullable: true
        foodStyle:
          type: string
          nullable: true
        subCuisine:
          type: string
          nullable: true
        allergies:
          type: string
          nullable: true
        foodPrefInherited:
          type: boolean
          nullable: true
        foodPrefCustomized:
          type: boolean
          nullable: true
      required:
        - name
        - age
        - schoolStartTime
        - schoolEndTime
        - goals

    UpdateChildBody:
      type: object
      properties:
        name:
          type: string
        dob:
          type: string
          nullable: true
        age:
          type: integer
        ageMonths:
          type: integer
        isSchoolGoing:
          type: boolean
          nullable: true
        childClass:
          type: string
          nullable: true
        schoolStartTime:
          type: string
        schoolEndTime:
          type: string
        schoolDays:
          type: array
          nullable: true
          items:
            type: integer
            minimum: 1
            maximum: 7
        wakeUpTime:
          type: string
        sleepTime:
          type: string
        travelMode:
          type: string
        travelModeOther:
          type: string
          nullable: true
        foodType:
          type: string
        goals:
          type: string
        babysitterId:
          type: integer
          nullable: true
        photoUrl:
          type: string
          nullable: true
        feedingType:
          type: string
          nullable: true
          description: Infant-only — how the baby is fed. One of "breastfeeding", "formula", "mixed".
        sleepPattern:
          type: string
          nullable: true
          description: Infant-only — sleep style captured during onboarding. One of "flexible", "irregular", "short_naps".
        dietType:
          type: string
          nullable: true
        foodStyle:
          type: string
          nullable: true
        subCuisine:
          type: string
          nullable: true
        allergies:
          type: string
          nullable: true
        foodPrefInherited:
          type: boolean
          nullable: true
        foodPrefCustomized:
          type: boolean
          nullable: true
        parentGoals:
          type: array
          nullable: true
          description: Adaptive Family Intelligence — replace structured optimization goals.
          items:
            type: string
            enum: [improve_sleep, reduce_tantrums, improve_focus, reduce_screen_time, increase_independence]

    RoutineItem:
      type: object
      properties:
        id:
          type: string
        time:
          type: string
        activity:
          type: string
        duration:
          type: integer
        category:
          type: string
        notes:
          type: string
        rewardPoints:
          type: integer
        status:
          type: string
          enum: [pending, completed, skipped, delayed]
        meal:
          type: string
          nullable: true
        recipe:
          type: object
          nullable: true
          properties:
            prepTime: { type: string }
            cookTime: { type: string }
            servings: { type: string }
            ingredients:
              type: array
              items: { type: string }
            steps:
              type: array
              items: { type: string }
            tip: { type: string, nullable: true }
        nutrition:
          type: object
          nullable: true
          properties:
            calories: { type: string }
            protein: { type: string }
            carbs: { type: string }
            fat: { type: string }
            notes: { type: string, nullable: true }
        ageBand:
          type: string
          nullable: true
          enum: ["2-5", "6-10", "10+"]
        parentHubTopic:
          type: string
          nullable: true
      required:
        - time
        - activity
        - duration
        - category

    Routine:
      type: object
      properties:
        id:
          type: integer
        childId:
          type: integer
        childName:
          type: string
        date:
          type: string
        title:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/RoutineItem"
        uiPrefs:
          $ref: "#/components/schemas/RoutineUiPrefs"
        customized:
          type: boolean
          description: True when the user has manually edited one or more items in this routine.
        adaptations:
          type: array
          nullable: true
          description: |
            Adaptive Family Intelligence — short human-readable strings explaining why this
            routine differs from a default one (e.g. "Reduced morning load — sleep was shorter
            yesterday", "Placed learning at 09:00 (peak focus window)"). Surfaced in the
            "Why this routine?" card.
          items:
            type: string
        createdAt:
          type: string
      required:
        - id
        - childId
        - childName
        - date
        - title
        - items
        - uiPrefs
        - customized
        - createdAt

    RoutineUiPrefs:
      type: object
      description: Per-routine UI preferences synced across web + mobile.
      properties:
        ageBandFilter:
          type: string
          nullable: true
          description: Currently selected age-band filter chip, or null for "All".
        pushReminders:
          type: boolean
          description: |
            When true, the server-side notification cron sends a push reminder
            ~5 minutes before each pending item in this routine. Independent of
            local on-device notifications and survives reinstall / Expo Go.

    UpdateRoutineUiPrefsBody:
      type: object
      description: Patch payload for routine UI preferences. Only the fields included are updated.
      properties:
        ageBandFilter:
          type: string
          nullable: true
          description: Selected age-band filter chip, or null to clear.
        pushReminders:
          type: boolean
          description: Enable or disable server-pushed per-task reminders for this routine.

    CreateRoutineBody:
      type: object
      properties:
        childId:
          type: integer
        date:
          type: string
        title:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/RoutineItem"
        override:
          type: boolean
        adaptations:
          type: array
          nullable: true
          description: |
            Adaptive Family Intelligence — pass through the adaptations array returned
            from /routines/generate so it persists on the saved routine row and can
            be displayed in the "Why this routine?" card later.
          items:
            type: string
      required:
        - childId
        - date
        - title
        - items

    GenerateRoutineBody:
      type: object
      properties:
        childId:
          type: integer
        date:
          type: string
        hasSchool:
          type: boolean
        specialPlans:
          type: string
          nullable: true
        fridgeItems:
          type: string
          nullable: true
        mood:
          type: string
          nullable: true
        caregiver:
          type: string
          enum: [mom, dad, both, grandparent, babysitter]
          default: mom
          description: Who is handling the child today. Drives tone, simplification, and bonding density. Reuses the HandlerKey enum from @workspace/family-routine.
        weatherOutdoor:
          type: string
          enum: [yes, no, limited]
          default: "yes"
          description: Outdoor-weather signal. "no" swaps outdoor blocks for indoor alternatives, "limited" shortens them and adds an indoor backup note.
        region:
          type: string
          nullable: true
        wakeTime:
          type: string
          nullable: true
        age:
          type: integer
          nullable: true
        schoolStart:
          type: string
          nullable: true
        schoolEnd:
          type: string
          nullable: true
      required:
        - childId
        - date

    GeneratedRoutine:
      type: object
      properties:
        title:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/RoutineItem"
        adaptations:
          type: array
          nullable: true
          description: Human-readable explanations of how this routine was adapted to the child's signals, goals, and energy profile.
          items:
            type: string
      required:
        - title
        - items

    CheckRoutineResponse:
      type: object
      properties:
        exists:
          type: boolean
        routineId:
          type: integer
      required:
        - exists

    UpdateRoutineItemsBody:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RoutineItem"
      required:
        - items

    InsightsItem:
      type: object
      properties:
        type:
          type: string
          enum: [positive, warning, suggestion]
        message:
          type: string
        icon:
          type: string
      required:
        - type
        - message
        - icon

    GenerateInsightsResponse:
      type: object
      properties:
        insights:
          type: array
          items:
            $ref: "#/components/schemas/InsightsItem"
        summary:
          type: string
      required:
        - insights
        - summary

    BabysitterSchema:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        name:
          type: string
        mobileNumber:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - userId
        - name
        - createdAt

    CreateBabysitterBody:
